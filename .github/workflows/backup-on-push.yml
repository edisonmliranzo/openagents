name: Backup On Push

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

concurrency:
  group: backup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backup:
    if: github.event.deleted != true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create immutable backup tag
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          timestamp="$(date -u +'%Y%m%d-%H%M%S')"
          short_sha="${COMMIT_SHA::7}"
          tag_name="backup/${BRANCH_NAME}/${timestamp}-${short_sha}-run${RUN_ID}.${RUN_ATTEMPT}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$tag_name" "$COMMIT_SHA" -m "Backup for ${BRANCH_NAME} at ${COMMIT_SHA}"
          git push origin "refs/tags/$tag_name"

      - name: Print restore hint
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "Backup tags for this branch:"
          echo "  git fetch --tags"
          echo "  git tag -l 'backup/${BRANCH_NAME}/*'"
